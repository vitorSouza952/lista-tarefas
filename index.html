<!DOCTYPE html>
<html lang="pt-BR">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Lista de Tarefas</title>
    <!-- <link rel="stylesheet" href="css/estilos.css" /> -->
    <!-- <script src="js/funcoes.js" defer></script> -->
    <link rel="stylesheet" href="css/estilos.min.css">
    <script src="js/funcoes.min.js" defer></script>
  </head>
  <body>
    <div class="area-site">
      <header>
        <h1 class="titulo-principal">Lista de Tarefas</h1>
        <form id="form" class="form">
          <label for="campo-tarefa">
            Digite sua tarefa: <span class="campo-obrigatorio">*</span>
          </label>
          <input
            type="text"
            name="tarefa"
            id="campo-tarefa"
            class="campo"
            placeholder="Ex: Tomar banho"
            maxlength="30"
            required
          />
          <input type="submit" value="Adicionar" class="botao botao-enviar" />
        </form>
      </header>

      <main id="conteudo-principal" class="conteudo-principal esconder">
        <ul id="lista-tarefas" class="lista-tarefas"></ul>
      </main>

      <template id="template">
        <li class="item-lista-tarefas">
          <p class="txt-tarefa"></p>
          <div class="area-acoes-tarefa">
            <button type="button" class="botao botao-alternar-estado">
              Concluir
            </button>
            <button type="button" class="botao botao-deletar">Deletar</button>
          </div>
        </li>
      </template>

      <div id="fundo-modal" class="fundo-modal esconder"></div>
      <div id="modal" class="modal esconder">
        <h2 class="titulo-modal">Atenção:</h2>
        <p id="txt-modal" class="txt-modal"></p>
        <button
          type="button"
          id="botao-fechar-modal"
          class="botao botao-fechar-modal"
        >
          Fechar
        </button>
      </div>

      <footer class="rodape">
        <p>
          &copy; <span id="ano-atual">2025</span> Copyright - by Vitor Souza.
        </p>
      </footer>
    </div>
  </body>
</html>
