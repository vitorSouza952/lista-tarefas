<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Lista de Tarefas</title>
    <!-- <link rel="stylesheet" href="css/styles.css"> -->
    <link rel="stylesheet" href="css/styles.min.css">
</head>
<body>
    <div class="site-area">
        <header class="header">
            <h1 class="main-title">Minha Lista de Tarefas</h1>
            <p id="error-msg" class="error-msg">Mensagem de erro.</p>
            <form id="form" class="form">
                <input type="text" name="task-text" id="task-text" class="form-control" placeholder="Adicione uma nova tarefa" maxlength="30" required>
                <input type="submit" value="Adicionar" class="btn submit-btn">
            </form>
        </header>
        <main id="main-content" class="main-content">
            <ul id="task-list" class="task-list"></ul>
        </main>
        <footer class="footer">
            <p>
                Desenvolvido por <a href="https://github.com/vitorsouza952" target="_blank" class="copyright-link">Vitor Souza</a>
            </p>
        </footer>
    </div>
    <script src="js/jquery-3.7.1.min.js"></script>
    <!-- <script src="js/scripts.js"></script> -->
    <script src="js/scripts.min.js"></script>
</body>
</html>
